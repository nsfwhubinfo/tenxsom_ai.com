version: '3.8'

services:
  quick-validation:
    build:
      context: ../..
      dockerfile: testing/meta_opt_quant_v6/Dockerfile.ci
    environment:
      - PYTHONPATH=/app
    volumes:
      - ../../:/app
    working_dir: /app/testing/meta_opt_quant_v6
    command: python3 run_quick_validation_test.py
    healthcheck:
      test: ["CMD", "python3", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
    mem_limit: 2g
    cpus: 2.0