name: META-OPT-QUANT V6 Quick Validation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  quick-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 65
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy scipy numba psutil
        
    - name: Run Quick CI/CD Validation
      run: |
        cd testing/meta_opt_quant_v6
        python3 run_quick_validation_test.py
      
    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: quick-validation-report
        path: |
          testing/meta_opt_quant_v6/quick_validation_test_report.json
          testing/meta_opt_quant_v6/quick_validation_test.log
          
    - name: Check validation status
      run: |
        if [ $? -eq 0 ]; then
          echo "✅ Quick validation PASSED - Ready for deployment"
        else
          echo "❌ Quick validation FAILED - Blocking deployment"
          exit 1
        fi